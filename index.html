<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adrián Gómez-Lobo Núñez — Game Developer</title>

  <meta property="og:title" content="Adrián Gómez-Lobo Núñez — Game Developer">
  <meta property="og:description" content="Portfolio jugable: videojuegos, herramientas para Unity y concept art.">
  <meta property="og:type" content="website">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div id="intro">
    <div class="sub">Game Developer · Portfolio</div>
    <h1><br><span>Adrián Gómez-Lobo Núñez</span></h1>
    <button id="start">▶ Empezar nivel</button>
    <div class="sub" style="opacity:.5; font-size:11px">Desplázate para avanzar</div>
  </div>

  <div id="stage" data-zone="videojuegos" aria-hidden="true">

    <div class="orb"></div>

    <div class="layer layer-far"></div>
    <div class="layer layer-mid"></div>
    <div class="layer layer-close"></div>



    <div id="world">
      <div class="ground"></div>
    </div>

    <div id="character">
      <canvas class="idle"></canvas>
      <canvas class="walk"></canvas>
      <canvas class="jump"></canvas>
    </div>

    <div class="dust"></div>

    <div class="d-pad">
      <button id="pad-up" class="pad-btn">▲</button>
      <div class="pad-row">
        <button id="pad-left" class="pad-btn">◀</button>
        <button id="pad-right" class="pad-btn">▶</button>
      </div>
    </div>

    <div class="progress">
      <div class="bar"></div>
    </div>

    <div class="hud">
      <span class="name">Adrián Gómez-Lobo Núñez</span>
      <a id="toEnd" href="#" title="Saltar al final">CV / Contacto ⏭</a>
      <span class="zone">Inicio</span>
    </div>

    <div class="hint"><span class="key">◀ / ▶</span> o <span class="key">A / D</span> Moverse · <span
        class="key">▲</span> o <span class="key">Espacio</span> Saltar</div>
  </div>

  <div class="card" id="card" role="dialog" aria-live="polite">
    <div class="media"><span class="badge"></span><span class="placeholder"></span></div>
    <div class="body">
      <h3></h3>
      <div class="meta"></div>
      <p></p>
      <div class="links"></div>
    </div>
  </div>

  <div id="scroll-spacer"></div>

  <script src="projects.js"></script>
  <script src="main.js"></script>
</body>

</html>
