<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adrián Gómez-Lobo Núñez — Game Developer</title>

  <!-- ===== Open Graph: cómo se ve al compartir en LinkedIn / Twitter ===== -->
  <meta property="og:title" content="Adrián Gómez-Lobo Núñez — Game Developer">
  <meta property="og:description" content="Portfolio jugable: videojuegos, herramientas para Unity y concept art.">
  <meta property="og:type" content="website">

  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap"
    rel="stylesheet">

  <!-- Estilos (módulo aparte) -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- ====================== INTRO / PANTALLA DE INICIO ====================== -->
  <div id="intro">
    <div class="sub">Game Developer · Portfolio</div>
    <h1><br><span>Adrián Gómez-Lobo Núñez</span></h1>
    <button id="start">▶ Empezar nivel</button>
    <div class="sub" style="opacity:.5; font-size:11px">Desplázate para avanzar</div>
  </div>

  <!-- ====================== ESCENARIO (ventana de juego) ====================== -->
  <div id="stage" aria-hidden="true">
    <div class="sky sky--1"></div>
    <div class="sky sky--2"></div>
    <div class="sky sky--3"></div>
    <div class="orb"></div>

    <div class="layer layer-far">
      <div class="hills">
        <div class="hill"></div>
        <div class="hill"></div>
        <div class="hill"></div>
        <div class="hill"></div>
        <div class="hill"></div>
        <div class="hill"></div>
        <div class="hill"></div>
        <div class="hill"></div>
      </div>
    </div>
    <div class="layer layer-mid">
      <div class="hills">
        <div class="hill"></div>
        <div class="hill"></div>
        <div class="hill"></div>
        <div class="hill"></div>
        <div class="hill"></div>
        <div class="hill"></div>
      </div>
    </div>

    <!-- Postes/banderas que marcan cada proyecto (los coloca el JS) -->
    <div id="world"></div>

    <div class="ground"></div>

    <!-- ===== PERSONAJE: dos capas de sprite (andar + idle) ===== -->
    <div id="character">
      <canvas class="idle"></canvas>
      <canvas class="walk"></canvas>
    </div>
    <div class="dust"></div>

    <!-- HUD -->
    <div class="progress">
      <div class="bar"></div>
    </div>
    <div class="hud">
      <span class="name">Adrián Gómez-Lobo Núñez</span>
      <span class="zone">Inicio</span>
    </div>
    <a id="toEnd" href="#" title="Saltar al final">CV / Contacto ⏭</a>
    <div class="hint"><span class="key">scroll</span> avanzar por el nivel</div>
  </div>

  <!-- Tarjeta de proyecto (una sola, el JS la rellena según el proyecto cercano) -->
  <div class="card" id="card" role="dialog" aria-live="polite">
    <div class="media"><span class="badge"></span><span class="placeholder"></span></div>
    <div class="body">
      <h3></h3>
      <div class="meta"></div>
      <p></p>
      <div class="links"></div>
    </div>
  </div>

  <!-- Spacer que define cuánto se puede hacer scroll -->
  <div id="scroll-spacer"></div>

  <!-- Scripts (módulos aparte). projects.js primero: define los datos que usa main.js -->
  <script src="projects.js"></script>
  <script src="main.js"></script>
</body>

</html>
