<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adrián Gómez-Lobo Núñez — Game Developer</title>

  <meta property="og:title" content="Adrián Gómez-Lobo Núñez — Game Developer">
  <meta property="og:description" content="Portfolio jugable: videojuegos, herramientas para Unity y concept art.">
  <meta property="og:type" content="website">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="css/cards.css">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

  <div id="intro">
    <div class="sub">Game Developer · Portfolio</div>
    <h1><br><span>Adrián Gómez-Lobo Núñez</span></h1>
    
    <button id="start">▶ Empezar nivel</button>

    <div class="intro-links">
      <a href="assets/Adrian_Gomez_Lobo_CV.pdf" target="_blank" title="Ver CV (PDF)"><i class="fa-solid fa-file-pdf"></i></a>
      <a href="mailto:adrian.gomezlobo@gmail.com" title="Contacto por Correo"><i class="fa-solid fa-envelope"></i></a>
      <a href="https://www.linkedin.com/in/adri%C3%A1n-gomez-lobo-97b89a2ab?utm_source=share&utm_campaign=share_via&utm_content=profile&utm_medium=android_app" target="_blank" title="LinkedIn"><i class="fa-brands fa-linkedin"></i></a>
      <a href="https://drakon04.itch.io/" target="_blank" title="Itch.io" class="link-itchio"></a>
    </div>

    <div class="sub" style="opacity:.5; font-size:11px; margin-top: 20px;">Desplázate para avanzar</div>
  </div>

  <div id="stage" data-zone="videojuegos">

    <div class="orb"></div>

    <div class="layer layer-far"></div>
    <div class="layer layer-mid"></div>
    <div class="layer layer-close"></div>

    <div id="world">
      <div class="ground g-row-1"></div>
      <div class="ground g-row-2"></div>
      <div class="ground g-row-3"></div>
    </div>

    <div id="character">
      <canvas class="idle"></canvas>
      <canvas class="walk"></canvas>
      <canvas class="jump"></canvas>
    </div>

    <div class="dust"></div>

    <div class="d-pad">
      <button class="pad-btn" id="btn-left">◀</button>
      <button class="pad-btn" id="btn-right">▶</button>
    </div>

    <div class="action-pad">
      <button class="pad-btn jump-btn" id="btn-up">A</button>
    </div>

    <div class="progress">
      <div class="bar"></div>
    </div>

    <div class="hud">
      <span class="name">Adrián Gómez-Lobo Núñez</span>
      <span class="coin-counter" style="margin-left: 15px; color: #ffcc00; font-family: var(--font-mono); font-weight: bold;">🪙 <span id="coin-score">0</span>/10</span>
      <a id="toEnd" href="#" title="Saltar al final">CV / Contacto ⏭</a>
      <span class="zone">Inicio</span>
    </div>

    <div class="hint">
      <span class="key">◀ / ▶</span> o <span class="key">A / D</span> Moverse ·
      <span class="key">▲</span> o <span class="key">Espacio</span> Saltar
    </div>

    <div id="card-container" class="card-container">
      <div class="card" id="project-card">
        <div class="media">
          <span class="badge"></span>
          <div class="placeholder"></div>
        </div>
        <div class="body">
          <h3></h3>
          <div class="meta"></div>
          <p></p>
          <div class="links"></div>
        </div>
      </div>
    </div>

  </div>
  
  <div id="scroll-spacer"></div>

  <script src="projects.js"></script>
  <script src="main.js"></script>
</body>

</html>
